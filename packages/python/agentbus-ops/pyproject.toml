[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "okf-agentbus-ops"
version = "0.1.0"
description = "Opinionated SRE ops for AgentBus: edge-triggered health watchdog and SREWatchdogAgent."
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.11"
authors = [{ name = "onicarps" }]
keywords = ["agentbus", "sre", "ops", "watchdog", "okf"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: System :: Monitoring",
]
dependencies = [
    "okf-agentbus>=0.16.3",
    "click>=8.0",
]

[project.optional-dependencies]
dev = ["pytest>=8.0"]

[project.urls]
Homepage = "https://github.com/onicarps/agentbus"
Repository = "https://github.com/onicarps/agentbus"
Documentation = "https://github.com/onicarps/agentbus/tree/main/packages/python/agentbus-ops"

[project.scripts]
agentbus-ops = "agentbus_ops.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["src/agentbus_ops"]

[tool.hatch.build.targets.sdist]
only-include = [
    "src/agentbus_ops",
    "tests",
    "examples",
    "README.md",
    "pyproject.toml",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
