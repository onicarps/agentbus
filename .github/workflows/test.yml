name: Test

on:
  pull_request:
  push:
    branches: [main, master]

permissions:
  contents: read

env:
  GO_VERSION: "1.22.12"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go-core/go.sum

      - name: Build agentbus-go-worker (webhook E2E)
        run: |
          mkdir -p go-core/bin
          (cd go-core && go build -o bin/agentbus-go-worker ./cmd/agentbus-go-worker)
          test -x go-core/bin/agentbus-go-worker

      - name: Install package and dev dependencies
        run: pip install -e ".[dev]"

      - name: Pytest
        run: pytest tests/ -q --tb=short
