# Swarm RBAC — copy to .agentbus/roles.yaml or run: agentbus config init-rbac
roles:
  architect:
    can_publish_topics: ["okf/handoff", "okf/approval", "system/*"]
    can_approve: true
  engineer:
    can_publish_topics: ["okf/handoff"]
    forbidden_payloads: ["*PASS*", "*FAIL*"]
  qa_droid:
    can_publish_topics: ["okf/handoff"]
    requires_crypto_proof: true
  observer:
    can_publish_topics: ["system/*"]
producers:
  grok: engineer
  agy: architect
  hermes: qa_droid
  wiretap: observer
  os-watcher: observer
  swarm-tail: observer
  coderabbit: architect