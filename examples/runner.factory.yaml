# Factory headless runner (v0.15 Phase D)
# Dogfood:
#   export AGENTBUS_WORKSPACE=/home/oni/okf_agent_workspace
#   agentbus run --config examples/runner.factory.yaml --once
#
# CI / offline: set adapter.dry_run: true
version: "1.0"
runner_id: factory-runner-1
producer_id: factory
intake:
  mode: webhook_queue
  runtime: factory
adapter:
  type: factory
  command: droid
  timeout_seconds: 1800
  # skip_permissions: true  # default True → --skip-permissions-unsafe (no --auto)
  # auto: high              # only used when skip_permissions: false
  output_format: text
  tag: factory-runner
  # dry_run: true
  # mission: false
  # model: null
  # extra_args: []
accept_to:
  - factory
  - qa
allow_broadcast: false
budget:
  max_turns_per_chain: 10
  max_event_age_hours: 24
poll_interval_ms: 1000
runs_dir: .agentbus/runs
