# Aider ops runner example (devops + SRE; copy to .agentbus/runner.aider.yaml)
# Role restructure 2026-07-19: accepter ops + legacy sre/devops/health aliases
version: "1.0"
runner_id: aider-runner-1
producer_id: aider
intake:
  mode: wake_file
  wake_file: .agentbus/WAKE.aider.json
adapter:
  type: aider
  command: aider
  timeout_seconds: 600
  yes_always: true
  # Yolo-Auto OpenAI-compatible (keys in ~/.aider.env only)
  model: openai/qwen3.6-35b-a3b
  extra_args:
    - --env-file
    - /home/oni/.aider.env
    - --openai-api-base
    - https://yolo-auto.com/v1
    - --no-git
    - --no-auto-commits
accept_to:
  - aider
  - ops
  - sre
  - devops
  - health
allow_broadcast: false
budget:
  max_turns_per_chain: 8
poll_interval_ms: 2000
runs_dir: .agentbus/runs
